<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VelocDrive - Engenharia Reversa Localiza</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-blobs"></div>

    <header class="navbar">
        <div class="logo">
            <span class="logo-green">VELOC</span><span>DRIVE</span>
        </div>
        <nav>
            <button class="btn-ai">Pedir Recomendação à IA</button>
        </nav>
    </header>

    <main class="container">
        <section class="hero">
            <h1>Aluguel de Carros <span>Premium</span></h1>
            <p>Sua jornada começa com a escolha perfeita.</p>
        </section>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">Todos</button>
            <button class="filter-btn" data-filter="esportivo">Esportivos</button>
            <button class="filter-btn" data-filter="luxo">Luxo</button>
        </div>

        <div class="car-grid">
            <div class="car-card" data-category="Luxo">
                <div class="car-img">
                    <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&q=80&w=400" alt="BMW 320i F30 (2019)">
                </div>
                <div class="car-info">
                    <h3>BMW 320i F30 (2019)</h3>
                    <p class="price">R$ 850<span>/dia</span></p>
                    <button class="btn-rent">Reservar Agora</button>
                </div>
            </div>

            <div class="car-card" data-category="Luxo">
                <div class="car-img">
                    <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=400" alt="Porsche Panamera Turbo (2017)">
                </div>
                <div class="car-info">
                    <h3>Porsche Panamera Turbo (2017)</h3>
                    <p class="price">R$ 1.200<span>/dia</span></p>
                    <button class="btn-rent">Reservar Agora</button>
                </div>
            </div>

            <div class="car-card" data-category="Esportivo">
                <div class="car-img">
                    <img src="https://images.unsplash.com/photo-1583121274602-3e2820c69888?auto=format&fit=crop&q=80&w=400" alt="Ferrari LaFerrari (2014)">
                </div>
                <div class="car-info">
                    <h3>Ferrari LaFerrari (2014)</h3>
                    <p class="price">R$ 2.500<span>/dia</span></p>
                    <button class="btn-rent">Reservar Agora</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
